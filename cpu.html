<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CPU Architecture Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text: #f1f5f9;
            --sub-text: #94a3b8;
            --bus-addr: #facc15;
            --bus-data: #34d399;
            --bus-ctrl: #f87171;
            --legacy: #78716c;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            padding: 20px 0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            width: 95vw;
            max-width: 1600px;
            padding: 20px;
        }

        .canvas {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            min-height: 80vh;
        }

        svg { width: 95%; height: 95%; }

        .node { cursor: pointer; transition: 0.3s ease; pointer-events: all; }
        .node rect { fill: #1e293b; stroke: #334155; stroke-width: 2; transition: 0.3s; }
        .node:hover > rect { stroke: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .node.active > rect { fill: rgba(56, 189, 248, 0.1); stroke: var(--accent); stroke-width: 3; }

        .internal { opacity: 0.4; transition: 0.3s; pointer-events: all; cursor: crosshair; }
        .node:hover .internal { opacity: 1; }
        .internal:hover rect { fill: var(--accent); stroke: white; }
        .internal.active rect { fill: var(--accent); stroke: white; filter: brightness(1.2); }

        .pipeline-stage { opacity: 0.6; transition: 0.3s; pointer-events: all; cursor: pointer; }
        .pipeline-stage:hover rect { fill: var(--accent); stroke: white; }
        .pipeline-stage.active rect { fill: var(--accent); stroke: white; filter: brightness(1.2); }
        .node:hover .pipeline-stage { opacity: 1; }

        .legacy-node rect { stroke: var(--legacy); stroke-dasharray: 4, 3; }
        .legacy-node:hover > rect { stroke: var(--legacy); filter: drop-shadow(0 0 6px rgba(120,113,108,0.4)); }

        .label { font-size: 11px; fill: var(--sub-text); font-weight: 500; pointer-events: none; }
        .sub-label { font-size: 7.5px; fill: white; font-weight: 700; pointer-events: none; }
        .bus-label { font-size: 7px; font-weight: 700; pointer-events: none; }
        .conceptual-label { font-size: 5.5px; fill: var(--legacy); font-weight: 500; pointer-events: none; }

        .data-stream {
            fill: none; stroke: var(--accent); stroke-width: 2; opacity: 0.2;
            stroke-dasharray: 10, 10; animation: pulse 2s linear infinite;
        }
        .bus-addr { fill: none; stroke: var(--bus-addr); stroke-width: 2; opacity: 0.35; stroke-dasharray: 6, 4; animation: pulse 2.5s linear infinite; }
        .bus-data { fill: none; stroke: var(--bus-data); stroke-width: 2; opacity: 0.35; stroke-dasharray: 6, 4; animation: pulse 2s linear infinite; }
        .bus-ctrl { fill: none; stroke: var(--bus-ctrl); stroke-width: 2; opacity: 0.35; stroke-dasharray: 6, 4; animation: pulse 1.8s linear infinite; }

        .pipeline-arrow { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.5; marker-end: url(#arrowhead); }

        @keyframes pulse { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 90vh;
            overflow-y: auto;
            position: sticky;
            top: 20px;
        }
        .side-panel::-webkit-scrollbar { width: 6px; }
        .side-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .card {
            background: var(--glass);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideIn 0.4s ease-out;
        }

        .analogy-tag {
            display: inline-block;
            padding: 4px 12px;
            background: var(--accent-glow);
            color: var(--accent);
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h1 { font-size: 2rem; margin: 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { line-height: 1.7; color: var(--sub-text); font-size: 14px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
        .stat { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; font-size: 12px; border: 1px solid rgba(255,255,255,0.05); }

        .legend {
            display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 16px;
            background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 3px; border-radius: 2px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            .side-panel { position: static; max-height: none; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="canvas">
        <svg viewBox="0 0 960 900">
            <defs>
                <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">

                </marker>

            <!-- ===== SYSTEM BUS (background layer) ===== -->
            <g class="node" id="ADDR_BUS">
                <path class="bus-addr" d="M470 310 V360"/>

            </g>
            <g class="node" id="DATA_BUS">

            </g>
            <g class="node" id="CTRL_BUS">

            </g>

            <!-- Bus: L2 to L3 -->
            <path class="bus-data" d="M490 405 V435"/>
            <path class="bus-addr" d="M470 405 V435"/>

            <!-- Bus: L3 to Memory Controller -->
            <path class="bus-data" d="M490 480 V520"/>
            <path class="bus-addr" d="M470 480 V520"/>

            <!-- Memory Controller to PCIe Root Complex -->
            <path class="data-stream" d="M490 590 V620"/>

            <!-- PCIe to GPU -->
            <path class="data-stream" d="M380 650 H260"/>

            <!-- PCIe to NPU -->
            <path class="data-stream" d="M380 665 H260"/>

            <!-- PCIe to RAM -->
            <path class="data-stream" d="M600 555 H740"/>

            <!-- PCIe to PCH -->

            <!-- PCH to peripherals -->

            <path class="data-stream" d="M490 790 V815"/>
            <path class="data-stream" d="M570 790 V815"/>
            <path class="data-stream" d="M330 790 V815"/>
            <path class="data-stream" d="M650 790 V815"/>

            <!-- ===== INSTRUCTION PIPELINE (top) ===== -->
            <g class="node" id="PIPELINE">
                <rect x="250" y="10" width="460" height="50" rx="12"/>

                <g class="node pipeline-stage" id="FETCH">
                    <rect x="262" y="32" width="95" height="22" rx="4"/>

                </g>
                <line class="pipeline-arrow" x1="357" y1="43" x2="372" y2="43"/>
                <g class="node pipeline-stage" id="DECODE">
                    <rect x="375" y="32" width="95" height="22" rx="4"/>
                    <text x="422" y="47" text-anchor="middle" class="sub-label">DECODE</text>
                </g>
                <line class="pipeline-arrow" x1="470" y1="43" x2="485" y2="43"/>
                <g class="node pipeline-stage" id="EXECUTE">
                    <rect x="488" y="32" width="95" height="22" rx="4"/>
                    <text x="535" y="47" text-anchor="middle" class="sub-label">EXECUTE</text>
                </g>
                <line class="pipeline-arrow" x1="583" y1="43" x2="598" y2="43"/>
                <g class="node pipeline-stage" id="STORE">
                    <rect x="601" y="32" width="95" height="22" rx="4"/>
                    <text x="648" y="47" text-anchor="middle" class="sub-label">STORE</text>
                </g>
            </g>

            <!-- ===== CPU CORE ===== -->
            <g class="node" id="CPU">
                <rect x="250" y="75" width="460" height="225" rx="20"/>
                <text x="480" y="95" text-anchor="middle" class="label">CPU CORE</text>

                <!-- Register Bank (2x3 grid: removed CIR, removed ACC) -->
                <g class="node" id="REGISTERS">
                    <rect x="265" y="105" width="130" height="180" rx="10"/>
                    <text x="330" y="122" text-anchor="middle" class="label">REGISTER BANK</text>

                    <g class="node internal" id="PC">
                        <rect x="275" y="130" width="50" height="30" rx="4"/>

                    </g>
                    <g class="node internal" id="IR">
                        <rect x="335" y="130" width="50" height="30" rx="4"/>
                        <text x="360" y="150" text-anchor="middle" class="sub-label">IR</text>
                    </g>
                    <g class="node internal" id="MAR">
                        <rect x="275" y="168" width="50" height="30" rx="4"/>
                        <text x="300" y="184" text-anchor="middle" class="sub-label">MAR</text>
                        <text x="300" y="194" text-anchor="middle" class="conceptual-label">conceptual</text>
                    </g>
                    <g class="node internal" id="MDR">
                        <rect x="335" y="168" width="50" height="30" rx="4"/>
                        <text x="360" y="184" text-anchor="middle" class="sub-label">MDR</text>
                        <text x="360" y="194" text-anchor="middle" class="conceptual-label">conceptual</text>
                    </g>
                    <g class="node internal" id="SP">
                        <rect x="275" y="206" width="50" height="30" rx="4"/>
                        <text x="300" y="226" text-anchor="middle" class="sub-label">SP</text>
                    </g>
                    <g class="node internal" id="FLAGS">
                        <rect x="335" y="206" width="50" height="30" rx="4"/>
                        <text x="360" y="226" text-anchor="middle" class="sub-label">FLAGS</text>
                    </g>
                    <g class="node internal" id="GPR">
                        <rect x="275" y="244" width="110" height="30" rx="4"/>
                        <text x="330" y="264" text-anchor="middle" class="sub-label">GPR (x16)</text>
                    </g>
                </g>

                <!-- CU -->
                <g class="node" id="CU">
                    <rect x="410" y="105" width="105" height="35" rx="8"/>
                    <text x="462" y="127" text-anchor="middle" class="label">CU</text>
                </g>

                <!-- ALU -->
                <g class="node" id="ALU">
                    <rect x="410" y="147" width="105" height="35" rx="8"/>
                    <text x="462" y="169" text-anchor="middle" class="label">ALU</text>
                </g>

                <!-- FPU -->
                <g class="node" id="FPU">
                    <rect x="410" y="189" width="105" height="35" rx="8"/>
                    <text x="462" y="211" text-anchor="middle" class="label">FPU</text>
                </g>

                <!-- BPU (Branch Prediction Unit) -->
                <g class="node" id="BPU">
                    <rect x="410" y="231" width="105" height="35" rx="8"/>
                    <text x="462" y="253" text-anchor="middle" class="label">BPU</text>
                </g>

                <!-- PREFETCH (Hardware Prefetcher) -->
                <g class="node" id="PREFETCH">
                    <rect x="410" y="273" width="105" height="17" rx="5"/>
                    <text x="462" y="285" text-anchor="middle" class="bus-label" fill="var(--sub-text)">PREFETCHER</text>
                </g>

                <!-- L1 Cache -->
                <g class="node" id="L1">
                    <rect x="530" y="105" width="96" height="52" rx="8"/>
                    <text x="578" y="127" text-anchor="middle" class="label">L1</text>
                    <text x="578" y="141" text-anchor="middle" class="label">CACHE</text>
                </g>

                <!-- Clock -->
                <g class="node" id="CLOCK">
                    <rect x="530" y="164" width="96" height="35" rx="8"/>
                    <text x="578" y="186" text-anchor="middle" class="label">CLOCK</text>
                </g>

                <!-- MMU -->
                <g class="node" id="MMU">
                    <rect x="530" y="206" width="96" height="35" rx="8"/>
                    <text x="578" y="228" text-anchor="middle" class="label">MMU</text>
                </g>

                <!-- Unused space filler for visual balance -->
                <g class="node" id="ROB">
                    <rect x="530" y="248" width="96" height="35" rx="8"/>
                    <text x="578" y="270" text-anchor="middle" class="label">ROB</text>
                </g>
            </g>

            <!-- ===== L2 CACHE ===== -->
            <g class="node" id="L2">
                <rect x="380" y="362" width="200" height="40" rx="10"/>
                <text x="480" y="387" text-anchor="middle" class="label">L2 CACHE (per-core)</text>
            </g>

            <!-- ===== L3 CACHE ===== -->
            <g class="node" id="L3">
                <rect x="350" y="438" width="260" height="40" rx="10"/>
                <text x="480" y="463" text-anchor="middle" class="label">L3 CACHE (shared)</text>
            </g>

            <!-- ===== MEMORY CONTROLLER (on-die, formerly Northbridge) ===== -->
            <g class="node" id="MEMCTRL">
                <rect x="370" y="520" width="220" height="65" rx="15"/>
                <text x="480" y="549" text-anchor="middle" class="label">MEMORY CONTROLLER</text>
                <text x="480" y="564" text-anchor="middle" class="bus-label" fill="var(--sub-text)">(on-die, formerly Northbridge)</text>
            </g>

            <!-- ===== PCIe ROOT COMPLEX ===== -->
            <g class="node" id="PCIE">
                <rect x="395" y="625" width="170" height="60" rx="12"/>
                <text x="480" y="652" text-anchor="middle" class="label">PCIe ROOT COMPLEX</text>
                <text x="480" y="667" text-anchor="middle" class="bus-label" fill="var(--sub-text)">Gen5 x16 / x4 / x1</text>
            </g>

            <!-- ===== GPU ===== -->
            <g class="node" id="GPU">
                <rect x="110" y="625" width="140" height="50" rx="12"/>
                <text x="180" y="647" text-anchor="middle" class="label">GPU</text>
                <text x="180" y="661" text-anchor="middle" class="bus-label" fill="var(--sub-text)">PCIe x16</text>
            </g>

            <!-- ===== NPU ===== -->
            <g class="node" id="NPU">
                <rect x="110" y="683" width="140" height="45" rx="12"/>
                <text x="180" y="703" text-anchor="middle" class="label">NPU</text>
                <text x="180" y="716" text-anchor="middle" class="bus-label" fill="var(--sub-text)">AI Accelerator</text>
            </g>

            <!-- ===== DRAM ===== -->
            <g class="node" id="RAM">
                <rect x="740" y="510" width="110" height="80" rx="10"/>
                <text x="795" y="545" text-anchor="middle" class="label">DRAM</text>
                <text x="795" y="560" text-anchor="middle" class="bus-label" fill="var(--sub-text)">DDR5</text>
                <text x="795" y="575" text-anchor="middle" class="bus-label" fill="var(--sub-text)">Dual-Channel</text>
            </g>

            <!-- ===== PCH (Platform Controller Hub) ===== -->
            <g class="node" id="PCH">
                <rect x="380" y="725" width="200" height="60" rx="15"/>
                <text x="480" y="752" text-anchor="middle" class="label">PCH</text>
                <text x="480" y="767" text-anchor="middle" class="bus-label" fill="var(--sub-text)">(Platform Controller Hub)</text>
            </g>

            <!-- ===== STORAGE ===== -->
            <g class="node" id="SSD">
                <rect x="285" y="820" width="90" height="40" rx="6"/>
                <text x="330" y="845" text-anchor="middle" class="label">SSD</text>
            </g>
            <g class="node legacy-node" id="HDD">
                <rect x="445" y="820" width="90" height="40" rx="6"/>
                <text x="490" y="840" text-anchor="middle" class="label">HDD</text>
                <text x="490" y="852" text-anchor="middle" class="conceptual-label">legacy</text>
            </g>

            <!-- ===== I/O ===== -->
            <g class="node" id="USB">
                <rect x="365" y="820" width="90" height="40" rx="6"/>
                <text x="410" y="845" text-anchor="middle" class="label">USB</text>
            </g>
            <g class="node" id="NIC">
                <rect x="525" y="820" width="90" height="40" rx="6"/>
                <text x="570" y="845" text-anchor="middle" class="label">NIC</text>
            </g>

            <!-- ===== UEFI FIRMWARE ===== -->
            <g class="node" id="UEFI">
                <rect x="605" y="820" width="90" height="40" rx="6"/>
                <text x="650" y="840" text-anchor="middle" class="label">UEFI</text>
                <text x="650" y="852" text-anchor="middle" class="bus-label" fill="var(--sub-text)">SPI Flash</text>
            </g>

            <!-- ===== BUS LEGEND ===== -->
            <line x1="30" y1="880" x2="50" y2="880" stroke="var(--bus-addr)" stroke-width="2" stroke-dasharray="6,4"/>
            <text x="55" y="884" class="bus-label" fill="var(--bus-addr)">Address Bus</text>
            <line x1="130" y1="880" x2="150" y2="880" stroke="var(--bus-data)" stroke-width="2" stroke-dasharray="6,4"/>
            <text x="155" y="884" class="bus-label" fill="var(--bus-data)">Data Bus</text>
            <line x1="220" y1="880" x2="240" y2="880" stroke="var(--bus-ctrl)" stroke-width="2" stroke-dasharray="6,4"/>
            <text x="245" y="884" class="bus-label" fill="var(--bus-ctrl)">Control Bus</text>
            <line x1="320" y1="880" x2="340" y2="880" stroke="var(--accent)" stroke-width="2" stroke-dasharray="10,10" opacity="0.3"/>
            <text x="345" y="884" class="bus-label" fill="var(--sub-text)">Data Stream</text>
            <rect x="435" y="876" width="18" height="8" rx="2" fill="none" stroke="var(--legacy)" stroke-width="1.5" stroke-dasharray="4,3"/>
            <text x="458" y="884" class="bus-label" fill="var(--legacy)">Legacy</text>
        </svg>
    </div>

    <div class="side-panel">
        <div class="card" id="info-card">
            <h1>Hardware Matrix</h1>
            <p>Explore the full CPU architecture. Click any component — from pipeline stages and registers to caches, buses, and peripherals — to see how each piece fits into the system.</p>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--bus-addr)"></div>Address Bus</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--bus-data)"></div>Data Bus</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--bus-ctrl)"></div>Control Bus</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--legacy);border:1px dashed var(--legacy)"></div>Legacy</div>
            </div>
        </div>
    </div>
</div>

<script>
    const data = {
        CPU: {
            title: "The CPU Core",
            tag: "The Brain",
            analogy: "The entire workshop where all thinking and building happens.",
            desc: "The Central Processing Unit is the primary silicon die that fetches, decodes, executes, and stores instructions. Modern CPUs contain billions of transistors organized into cores, each with its own pipeline, register file, and execution units. A single core typically runs at 3–5 GHz, executing multiple instructions per clock cycle via superscalar architecture.",
            stats: ["Clock: 3–5 GHz", "Cores: 4–24+", "Transistors: ~10B", "Process: 3–7nm"]
        },
        PIPELINE: {
            title: "Instruction Pipeline",
            tag: "The Assembly Line",
            analogy: "A factory line where each station handles one step of building a product simultaneously.",
            desc: "The instruction pipeline breaks execution into stages so multiple instructions overlap. While one instruction is being executed, the next is being decoded, and another is being fetched. Modern CPUs have 14–20+ stage pipelines, with branch prediction and out-of-order execution to keep the pipeline full.",
            stats: ["Stages: 14–20+", "IPC: 4–6", "Branch Pred: 97%+", "Superscalar: Yes"]
        },
        FETCH: {
            title: "Fetch Stage",
            tag: "Step 1",
            analogy: "Reading the next line of the instruction manual from the bookshelf.",
            desc: "The CPU reads the <b>Program Counter (PC)</b> to determine the memory address of the next instruction, then sends that address to the L1 instruction cache. The fetched instruction bytes are placed into the <b>Instruction Register (IR)</b>. The <b>Branch Prediction Unit</b> may speculatively redirect the fetch to a predicted target address to avoid pipeline stalls.",
            stats: ["Reads: PC → L1i", "Width: 16–32 bytes", "Latency: 1 cycle", "Pred: Speculative"]
        },
        DECODE: {
            title: "Decode Stage",
            tag: "Step 2",
            analogy: "Translating the blueprint shorthand into actionable steps your hands understand.",
            desc: "The Control Unit examines the instruction opcode and operands. In CISC architectures (x86), complex instructions are broken into simpler <b>micro-ops (µops)</b>. The decoder identifies which execution unit is needed (ALU, FPU, load/store), reads source register addresses, and dispatches the operation to the reservation station for scheduling.",
            stats: ["Input: IR bits", "Output: µops", "Decoders: 4–6", "CISC→RISC: Yes"]
        },
        EXECUTE: {
            title: "Execute Stage",
            tag: "Step 3",
            analogy: "Actually hammering the nail, cutting the wood, or computing the math.",
            desc: "The ALU, FPU, or other functional units carry out the operation: arithmetic (ADD, SUB, MUL), logic (AND, OR, XOR, shift), floating-point math, or memory address calculation. Results are written to a destination register. Out-of-order engines may execute instructions in a different order than fetched, as long as data dependencies are respected.",
            stats: ["Units: ALU, FPU, AGU", "Width: 256–512 bit", "OoO: Yes", "Latency: 1–5 cyc"]
        },
        STORE: {
            title: "Store / Write-Back",
            tag: "Step 4",
            analogy: "Putting the finished product back on the shelf or handing it to the next station.",
            desc: "The result of the execution is written back to the destination register in the register file, or committed to memory via the <b>store buffer → L1 data cache → DRAM</b> path. The <b>reorder buffer (ROB)</b> ensures instructions retire in program order even if they executed out of order, maintaining architectural correctness.",
            stats: ["Target: Reg / L1d", "ROB: 256–512", "Store Buffer: 72+", "Commit: In-Order"]

    const infoCard = document.getElementById('info-card');

    document.querySelectorAll('.node').forEach(node => {
        node.addEventListener('click', (e) => {
            e.stopPropagation();

            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            node.classList.add('active');

            const item = data[node.id];
            if (!item) return;

            infoCard.style.animation = 'none';
            infoCard.offsetHeight;
            infoCard.style.animation = null;

            infoCard.innerHTML = `
                <div class="analogy-tag">${item.tag}</div>
                <h1>${item.title}</h1>
                <p style="color:var(--accent); font-style:italic;">"${item.analogy}"</p>
                <p>${item.desc}</p>
                <div class="stat-grid">
                    ${item.stats.map(s => `<div class="stat">${s}</div>`).join('')}
                </div>
            `;
        });
    });
